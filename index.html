<!DOCTYPE html>
<html>
<head>
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Language Translation Tool</h1>

    <form method="POST">

        <textarea name="text" placeholder="Enter text here..." required></textarea>

        <div class="dropdowns">

            <select name="source">
                {% for lang, code in languages.items() %}
                <option value="{{ code }}">{{ lang }}</option>
                {% endfor %}
            </select>

            <select name="target">
                {% for lang, code in languages.items() %}
                <option value="{{ code }}">{{ lang }}</option>
                {% endfor %}
            </select>

        </div>

        <button type="submit">Translate</button>

    </form>

    {% if translated_text %}

    <div class="result">
        <h2>Translated Text</h2>

        <p id="translated">{{ translated_text }}</p>

        <button onclick="copyText()">Copy</button>

        <button onclick="speakText()">Speak</button>
    </div>

    {% endif %}

</div>

<script>

function copyText() {
    let text = document.getElementById("translated").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function speakText() {
    let text = document.getElementById("translated").innerText;

    let speech = new SpeechSynthesisUtterance(text);

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
